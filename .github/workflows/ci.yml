name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22+ for npm 10.9+ — earlier npm versions reject lockfiles
          # whose esbuild platform packages rely on os/cpu filtering rather
          # than per-entry `optional: true` flags. Vitest pulls in
          # esbuild 0.28 which lists @esbuild/openharmony-arm64 in its
          # optionalDependencies; older npm runs npm ci as if it were a
          # regular dep and fails with EBADPLATFORM on linux-x64.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
